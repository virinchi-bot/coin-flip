<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Toss | Virinchi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #fdfdfd;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 700px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 50px;
        }

        /* The Coin */
        .coin-wrap {
            position: absolute;
            bottom: 250px;
            /* Aligned with thumb */
            width: 110px;
            height: 110px;
            z-index: 10;
            perspective: 1000px;
        }

        .coin {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 2s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.1), 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .heads {
            background: #f1c40f;
            color: #b8860b;
            transform: rotateY(0deg);
        }

        .tails {
            background: #ced6e0;
            color: #7f8c8d;
            transform: rotateY(180deg);
        }

        /* Real Hand Image */
        .hand-img {
            width: 280px;
            z-index: 5;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* Physics Animations */
        @keyframes coin-jump {
            0% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-400px) scale(1.6);
            }

            /* Flies toward screen */
            100% {
                transform: translateY(0) scale(1);
            }
        }

        @keyframes hand-flick {
            0% {
                transform: translateY(0);
            }

            15% {
                transform: translateY(25px);
            }

            30% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0);
            }
        }

        .animate-coin {
            animation: coin-jump 2s ease-in-out;
        }

        .animate-hand {
            animation: hand-flick 0.5s ease;
        }

        .flip-btn {
            background: #f1c40f;
            border: none;
            padding: 20px 80px;
            border-radius: 15px;
            font-size: 1.4rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 0 #d4af37;
            margin-top: 30px;
            transition: 0.1s;
        }

        .flip-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #d4af37;
        }
    </style>
</head>

<body>

    <div class="game-container">
        <div class="coin-wrap" id="coinWrap">
            <div class="coin" id="coin">
                <div class="face heads">★</div>
                <div class="face tails">T</div>
            </div>
        </div>

        <img src="/static/hand.png" class="hand-img" id="hand" alt="Fist">

        <button class="flip-btn" id="flipBtn">FLIP COIN</button>
    </div>

    <script>
        const coin = document.getElementById('coin');
        const coinWrap = document.getElementById('coinWrap');
        const hand = document.getElementById('hand');
        const flipBtn = document.getElementById('flipBtn');
        let currentRot = 0;

        flipBtn.addEventListener('click', async () => {
            flipBtn.disabled = true;
            hand.classList.add('animate-hand');

            const res = await fetch(`/flip?t=${Date.now()}`);
            const data = await res.json();

            coinWrap.classList.add('animate-coin');

            // Randomize rotations (min 8 full spins)
            const spins = (8 + Math.floor(Math.random() * 5)) * 360;
            const land = (data.result === 'heads') ? 0 : 180;
            currentRot += spins + land;

            if (currentRot % 360 !== land) currentRot += 180;
            coin.style.transform = `rotateY(${currentRot}deg)`;

            setTimeout(() => {
                hand.classList.remove('animate-hand');
                coinWrap.classList.remove('animate-coin');
                flipBtn.disabled = false;
            }, 2000);
        });
    </script>
</body>

</html>
