<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Flip | Virinchi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-main: #2d3436;
            --accent: #000000;
            --coin-gold: #f1c40f;
            --coin-silver: #dfe6e9;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .app-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px var(--shadow);
            text-align: center;
            width: 300px;
            border: 1px solid #f0f0f0;
        }

        h1 {
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 50px;
            text-transform: uppercase;
            color: #d1d1d1;
        }

        .coin-container {
            margin: 0 auto 40px;
            width: 140px;
            height: 140px;
            perspective: 1000px;
        }

        .coin {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            /* Transition time is handled by JS for variable speed */
            transition: transform 2s cubic-bezier(0.15, 0.85, 0.35, 1.05);
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: 600;
        }

        .heads {
            background: var(--coin-gold);
            color: white;
            transform: rotateY(0deg);
        }

        .tails {
            background: var(--coin-silver);
            color: #636e72;
            transform: rotateY(180deg);
        }

        .flip-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .flip-btn:active {
            transform: scale(0.98);
        }

        .flip-btn:disabled {
            background: #eee;
            color: #bbb;
            cursor: not-allowed;
        }

        .status {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #a0a0a0;
            height: 20px;
        }

        /* Credits Style */
        .credits {
            margin-top: 30px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: #ccc;
            text-transform: uppercase;
        }

        .credits span {
            color: #999;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="app-card">
        <h1>Quantum Toss</h1>

        <div class="coin-container">
            <div id="coin" class="coin">
                <div class="face heads">H</div>
                <div class="face tails">T</div>
            </div>
        </div>

        <button id="flipBtn" class="flip-btn">Flip</button>
        <div id="status" class="status">Tap to start</div>
    </div>

    <div class="credits">Created by <span>GEMINI</span></div>

    <script>
        const coin = document.getElementById('coin');
        const flipBtn = document.getElementById('flipBtn');
        const statusText = document.getElementById('status');
        let currentRotation = 0;

        flipBtn.addEventListener('click', async () => {
            flipBtn.disabled = true;
            statusText.innerText = "Flipping...";

            // 1. Variable Speed: Randomize the duration between 2.2s and 2.8s
            const duration = 2200 + Math.random() * 600;
            coin.style.transition = `transform ${duration}ms cubic-bezier(0.15, 0.85, 0.35, 1.05)`;

            try {
                // 2. Cache Buster: Added timestamp (?t=...) to ensure unique backend calls
                const response = await fetch(`/flip?t=${Date.now()}`);
                const data = await response.json();
                const result = data.result;

                // 3. Realistic Rotation Math
                const extraSpins = (5 + Math.floor(Math.random() * 5)) * 360;
                const targetSide = (result === 'heads') ? 0 : 180;

                // Ensure the coin always spins forward
                currentRotation += extraSpins;

                // Calculate landing so it ends on the correct face
                if (currentRotation % 360 !== targetSide) {
                    currentRotation += 180;
                }

                coin.style.transform = `rotateY(${currentRotation}deg)`;

                setTimeout(() => {
                    statusText.innerText = result.toUpperCase();
                    flipBtn.disabled = false;
                }, duration);

            } catch (error) {
                statusText.innerText = "System Error";
                flipBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
